name: Jerney DevSecops Workflow

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend   
jobs: 
  #Stage1
  lint:      
    name: "Lint Code" 
    runs-on: ubuntu-latest 
    continue-on-error: true 
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
     - name: Checkout code 
       uses: actions/checkout@v4

     - name: Setup Node. Js 
       uses: actions/setup-node@v4
       with:
         node-version: "20"
         cache: "npm"
         cache-dependency-path: "${{ matrix.component }}/package-lock.json"    

     - name: Install dependencies 
       working-directory: ${{ matrix.component }}           
       run: npm ci 

     - name: Run ESLint 
       working-directory: ${{ matrix.component }}
       run: npm run lint 

  sca:
    name: "Dependency Audit"
    runs-on: ubuntu-latest 
    needs: lint 
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
     - name: Checkout Code   
       uses: actions/checkout@v4

     - name: Setup Node.js 
       uses: actions/setup-node@v4 
       with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: "${{matrix.component}}/package-lock.json"

     - name: Install dependencies 
       working-directory: ${{ matrix.component}}
       run: npm ci 

    # npm audit for known vulnerabilities (fail on high/critical)
     - name: npm audit 
       working-directory: ${{ matrix.component }} 
       run: npm audit --audit-level=high || true 

  build:
    name: "Build ${{ matrix.component }}"
    runs-on: ubuntu-latest 
    needs: sca 
    permissions:
      contents: read 
      packages: write 
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
     - name: Checkout Code 
       uses: actions/checkout@v4

     - name: Setup Docker buildx 
       uses: docker/setup-buildx-action@v3
     - name: Log in to Github Container Registry
       uses: docker/login-action@v3
       with:
         registry: ghcr.io 
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

     - name: Extract metadata (tags, labels)
       id: meta 
       uses: docker/metadata-action@v5
       with:
         images: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
         tags: |
           type=sha,prefix=
           type=ref,event=branch 
           type=raw,value=latest,enable={{is_default_branch}}
     - name: Build and push image 
       uses: docker/build-push-action@v6
       with:
        context: ./${{ matrix.component }}
        file: ./${{ matrix.component }}/Dockerfile 
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha 
        cache-to: type=gha,mode=max 
        provenance: true 
        sbom: true      
           
  image-scan:
    name: "Scan ${{ matrix.component }} Image"
    runs-on: ubuntu-latest 
    continue-on-error: true 
    needs: build 
    strategy:
      matrix: 
        component: [backend, frontend]
    steps:
     - name: Checkout Code 
       uses: actions/checkout@v4
     - name: Build image for scanning
       run: |
         docker build \
         --no-cache \
         --pull \
         -f ./${{ matrix.component }}/Dockerfile \
         -t jerney-${{ matrix.component }}:scan \
         ./${{ matrix.component }}

     - name : Run Trivy vulnerability Scanner 
       uses:  aquasecurity/trivy-action@0.28.0
       with: 
         image-ref: "jerney-${{ matrix.component}}:scan"
         format: "table"
         exit-code: "1"
         ignore-unfixed: true 
         vuln-type: "os,library"
         severity: "CRITICAL,HIGH"
         timeout: "10m"

  iac-scan:
    name: "IaC Security Scan"
    runs-on: ubuntu-latest 
    continue-on-error: true 
    needs: lint 
    steps:
     - name: Checkout Code 
       uses: actions/checkout@v4

     - name: Run Checknov on Kubernetes manifests 
       uses: bridgecrewio/checkov-action@v12
       with:
         directory: k8s/
         framework: kubernetes 
         soft_fail: true 
         output_format: cli

  dockerfile-lint:
    name: "Dockerfile Lint"
    runs-on: ubuntu-latest 
    continue-on-error: true 
    strategy:
      matrix: 
        component: [backend, frontend]

    steps:
     - name: checkout code 
       uses: actions/checkout@v4  

     - name: Run HadoLint 
       uses: hadolint/hadolint-action@v3.1.0
       with:
         dockerfile: ${{ matrix.component }}/Dockerfile 
         failure-threshold: warning 

  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    needs: [build, image-scan, dockerfile-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Needed to push manifest changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          # Update backend image
          sed -i "s|image: .*jerney-backend.*|image: ${BACKEND_IMAGE}:${IMAGE_TAG}|g" k8s/jerney.yaml
          sed -i "s|image: BACKEND_IMAGE_PLACEHOLDER|image: ${BACKEND_IMAGE}:${IMAGE_TAG}|g" k8s/jerney.yaml

          # Update frontend image
          sed -i "s|image: .*jerney-frontend.*|image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|g" k8s/jerney.yaml
          sed -i "s|image: FRONTEND_IMAGE_PLACEHOLDER|image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|g" k8s/jerney.yaml

          echo "✅ Updated images to tag: ${IMAGE_TAG}"
          grep "image:" k8s/jerney.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push

        






